steps:
  # 1. AŞAMA: Backend İmajını Derle
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/english-backend:$SHORT_SHA', './backend']
  
  # 2. AŞAMA: Frontend İmajını Derle
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/english-frontend:$SHORT_SHA', './frontend']

  # 3. AŞAMA: İmajları Google Deposuna Push Et
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/english-backend:$SHORT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/english-frontend:$SHORT_SHA']

  # 4. AŞAMA: Kubernetes'teki Canlı Podları Yeni İmajlarla Güncelle
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'set'
      - 'image'
      - 'deployment/backend-deployment'
      - 'backend=gcr.io/$PROJECT_ID/english-backend:$SHORT_SHA'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=english-cluster'

  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'set'
      - 'image'
      - 'deployment/frontend-deployment'
      - 'frontend=gcr.io/$PROJECT_ID/english-frontend:$SHORT_SHA'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-central1-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=english-cluster'